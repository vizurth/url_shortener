version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - noctx
    - bodyclose
    - errorlint
    - gocritic

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

formatters:
  enable:
    - goimports

  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - errcheck
          - contextcheck
